# Local, Ollama-first overrides. Keep this file separate from the upstream
# docker-compose.yml so upstream updates can be merged without conflicts.
services:
  freedeepwiki:
    image: freedeepwiki:ollama
    env_file: !reset []
    environment:
      PORT: "${PORT:-8001}"
      SERVER_BASE_URL: "http://localhost:${PORT:-8001}"
      OLLAMA_HOST: "${OLLAMA_CONTAINER_ENDPOINT:-http://host.docker.internal:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-}"
      OLLAMA_EMBED_MODEL: "${OLLAMA_EMBED_MODEL:-}"
      OLLAMA_EMBED_BATCH_SIZE: "${OLLAMA_EMBED_BATCH_SIZE:-32}"
      OLLAMA_REQUEST_TIMEOUT: "${OLLAMA_REQUEST_TIMEOUT:-1800}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      FREEDEPWIKI_EMBEDDER_TYPE: ollama
      FREEDEPWIKI_CONFIG_DIR: /app/.freedeepwiki/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./.freedeepwiki:/app/.freedeepwiki
      - ./scripts/freedeepwiki_config.py:/opt/freedeepwiki_config.py:ro
    command:
      - /bin/bash
      - -c
      - |
        python /opt/freedeepwiki_config.py \
          --source /app/api/config \
          --output /app/.freedeepwiki/config \
          --ollama-endpoint "$${OLLAMA_HOST}" \
          --model "$${OLLAMA_MODEL}" \
          --embed-model "$${OLLAMA_EMBED_MODEL}"
        printf 'FREEDEPWIKI_OLLAMA_MODE=1\n' > /app/.env
        exec /app/start.sh
    # `docker compose up` starts it explicitly; it will not start at boot.
    restart: "no"
